# CI 流水线(切片9,docs/solution.md §5「页面即代码」):
# PR 与 main push 触发,校验不过则 workflow 失败、阻止合并(分支保护规则由维护者在仓库设置里开启)。
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # allowBuilds(esbuild)已在 pnpm-workspace.yaml 声明,frozen-lockfile 下自动生效
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # 校验页面文档(结构 + 语义 + 文件名)。失败时按错误分型汇总到 job summary:
      # SCHEMA_ERROR=页面文档写错(改文档);METRIC_GAP=指标缺口(需求信号,按模板开 issue)。
      - name: 校验页面文档
        run: |
          set +e
          pnpm validate 2>&1 | tee validate.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            {
              echo '## 页面文档校验失败'
              if grep -q 'SCHEMA_ERROR' validate.log; then
                echo '- **SCHEMA_ERROR**:页面文档写错,修改文档本身即可;版本类错误按日志提示执行 `pnpm migrate`(错误明细见「校验页面文档」步骤日志)。'
              fi
              if grep -q 'METRIC_GAP' validate.log; then
                echo '- **METRIC_GAP**:业务想要、数据服务没有的指标缺口——这是需求信号,不是 bug。请按模板开 issue 同步数据服务团队:[新建 metric-gap issue](https://github.com/CCharlesMeng/MetricCanvas/issues/new?template=metric-gap.yml)。'
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$code"

      - name: 单元测试
        run: pnpm test

      - name: 类型检查
        run: pnpm check

      # 静态构建(SvelteKit adapter-static,SPA fallback)。索引页由运行时经构建期
      # glob 收录的全部 pages/*.json 动态列出,新增看板无需手工登记。
      - name: 静态构建
        run: pnpm build

      # 部署载体(公司内网)待定,先以 artifact 形式交付构建产物;
      # 确定载体后再接 deploy-pages 或内网发布流程。
      - name: 上传静态构建产物
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: canvas-static
          path: apps/canvas/build
